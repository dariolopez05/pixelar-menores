networks:
  kafka-net:
    driver: bridge
  storage-net:
    driver: bridge
  db-net:
    driver: bridge

volumes:
  kafka-data:
  postgres-data:
  minio-data:

services:

  # ── 1. KAFKA ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── 2. POSTGRESQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-facedb}
      POSTGRES_USER: ${POSTGRES_USER:-faceuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-facepass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-faceuser} -d ${POSTGRES_DB:-facedb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. MINIO ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - storage-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 4. API GATEWAY ────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_PRODUCE_TOPIC: images.raw
      POSTGRES_URL: postgresql://${POSTGRES_USER:-faceuser}:${POSTGRES_PASSWORD:-facepass}@postgres:5432/${POSTGRES_DB:-facedb}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_RAW: raw-images
      MINIO_BUCKET_PROCESSED: processed-images
      MINIO_PRESIGNED_URL_EXPIRY: "3600"
      MINIO_SECURE: "false"
    networks:
      - kafka-net
      - storage-net
      - db-net
    volumes:
      - ./api-gateway:/app

  # ── 5. ORQUESTADOR 1 — Entrada ────────────────────────────
  orchestrator-1:
    build:
      context: ./orchestrator-1
      dockerfile: Dockerfile
    container_name: orchestrator-1
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: postgresql://${POSTGRES_USER:-faceuser}:${POSTGRES_PASSWORD:-facepass}@postgres:5432/${POSTGRES_DB:-facedb}
      KAFKA_DLQ_TOPIC: dead.letter.queue
    networks:
      - kafka-net
      - db-net
    volumes:
      - ./orchestrator-1:/app

  # ── 6. ORQUESTADOR 2 — Tras detección de caras ────────────
  orchestrator-2:
    build:
      context: ./orchestrator-2
      dockerfile: Dockerfile
    container_name: orchestrator-2
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: postgresql://${POSTGRES_USER:-faceuser}:${POSTGRES_PASSWORD:-facepass}@postgres:5432/${POSTGRES_DB:-facedb}
      KAFKA_DLQ_TOPIC: dead.letter.queue
    networks:
      - kafka-net
      - db-net
    volumes:
      - ./orchestrator-2:/app

  # ── 7. ORQUESTADOR 3 — Tras detección de edad ─────────────
  orchestrator-3:
    build:
      context: ./orchestrator-3
      dockerfile: Dockerfile
    container_name: orchestrator-3
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: postgresql://${POSTGRES_USER:-faceuser}:${POSTGRES_PASSWORD:-facepass}@postgres:5432/${POSTGRES_DB:-facedb}
      KAFKA_DLQ_TOPIC: dead.letter.queue
    networks:
      - kafka-net
      - db-net
    volumes:
      - ./orchestrator-3:/app

  # ── 8. ORQUESTADOR 4 — Cierre del pipeline ────────────────
  orchestrator-4:
    build:
      context: ./orchestrator-4
      dockerfile: Dockerfile
    container_name: orchestrator-4
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: postgresql://${POSTGRES_USER:-faceuser}:${POSTGRES_PASSWORD:-facepass}@postgres:5432/${POSTGRES_DB:-facedb}
      KAFKA_DLQ_TOPIC: dead.letter.queue
    networks:
      - kafka-net
      - db-net
    volumes:
      - ./orchestrator-4:/app

  # ── 9. FACE DETECTION (DC) ────────────────────────────────
  face-detection:
    build:
      context: ./face-detection
      dockerfile: Dockerfile
    container_name: face-detection
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: face-detection-group
      KAFKA_CONSUME_TOPIC: cmd.face_detection
      KAFKA_PRODUCE_TOPIC: evt.face_detection.completed
      KAFKA_DLQ_TOPIC: dead.letter.queue
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
    networks:
      - kafka-net
      - storage-net
    volumes:
      - ./face-detection:/app

  # ── 10/11/12. AGE DETECTION x3 (DE) ──────────────────────
  # Las 3 instancias comparten el mismo consumer group.
  # Kafka distribuye los mensajes entre ellas automáticamente.
  age-detection:
    build:
      context: ./age-detection
      dockerfile: Dockerfile
    container_name: age-detection
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: age-detection-group
      KAFKA_CONSUME_TOPIC: cmd.age_detection
      KAFKA_PRODUCE_TOPIC: evt.age_detection.completed
      KAFKA_DLQ_TOPIC: dead.letter.queue
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      MINOR_AGE_THRESHOLD: "18"
    networks:
      - kafka-net
      - storage-net
    volumes:
      - ./age-detection:/app
      - ./age-detection/model:/app/model

  # ── 13. PIXELATION (Pixp) ─────────────────────────────────
  pixelation:
    build:
      context: ./pixelation
      dockerfile: Dockerfile
    container_name: pixelation
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: pixelation-group
      KAFKA_CONSUME_TOPIC: cmd.pixelation
      KAFKA_PRODUCE_TOPIC: evt.pixelation.completed
      KAFKA_DLQ_TOPIC: dead.letter.queue
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      PIXEL_BLOCK_SIZE: "20"
    networks:
      - kafka-net
      - storage-net
    volumes:
      - ./pixelation:/app

  # ── 14. STORAGE SERVICE ───────────────────────────────────
  storage-service:
    build:
      context: ./storage-service
      dockerfile: Dockerfile
    container_name: storage-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: storage-group
      KAFKA_CONSUME_TOPIC: cmd.storage
      KAFKA_PRODUCE_TOPIC: evt.storage.completed
      KAFKA_DLQ_TOPIC: dead.letter.queue
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_PROCESSED: processed-images
      MINIO_SECURE: "false"
      MINIO_PRESIGNED_URL_EXPIRY: "3600"
      POSTGRES_URL: postgresql://${POSTGRES_USER:-faceuser}:${POSTGRES_PASSWORD:-facepass}@postgres:5432/${POSTGRES_DB:-facedb}
    networks:
      - kafka-net
      - storage-net
      - db-net
    volumes:
      - ./storage-service:/app
